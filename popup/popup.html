<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <style>
        :root {
            /* Theme colors - your script can change these dynamically */
            --status-color: #10b981; /* Modern Emerald Green */
            --status-bg: #ecfdf5;    /* Soft Green Tint */
            --text-main: #1f2937;    /* Dark Charcoal */
            --text-muted: #6b7280;   /* Slate Gray */
            --border-color: #e5e7eb; /* Light Gray Border */
        }

        body {
            width: 320px;
            margin: 0;
            padding: 16px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f9fafb;
            color: var(--text-main);
            box-sizing: border-box;
        }

        .card {
            background: #ffffff;
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 14px;
            padding-bottom: 12px;
            border-bottom: 1px dashed var(--border-color);
        }

        #verdict {
            font-size: 20px;
            font-weight: 700;
            color: var(--status-color);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        #score {
            font-size: 12px;
            font-weight: 600;
            color: var(--text-muted);
            background-color: #f3f4f6;
            padding: 4px 8px;
            border-radius: 20px;
        }

        .flag-container {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .flag-label {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 600;
            color: var(--text-muted);
            letter-spacing: 0.5px;
        }

        #flags {
            font-size: 14px;
            font-weight: 500;
            line-height: 1.5;
            color: var(--text-main);
            background-color: var(--status-bg);
            padding: 10px 12px;
            border-radius: 8px;
            border-left: 4px solid var(--status-color);
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <div id="verdict">Safe</div>
            <div id="score">Score: 0</div>
        </div>
        <div class="flag-container">
            <div class="flag-label">Details</div>
            <div id="flags">Allowlisted domain</div>
        </div>
    </div>
    <script src="popup.js"></script>
</body>
</html>
